name: hemo_app
description: "Hemo - Votre assistant santé IA spécialisé en drépanocytose"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
  flutter_sound: ^9.2.13
  path_provider: ^2.1.4
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
